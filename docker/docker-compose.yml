services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - payment-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: bash -c "alembic upgrade head && sanic app.core.factory:create_app --host=0.0.0.0 --port=8000 --single-process"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/payment_api
      JWT_SECRET: jwt-secret-change-in-production
      WEBHOOK_SECRET: webhook-secret-change-in-production
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      payment-network:

networks:
  payment-network:
    driver: bridge

volumes:
  pgdata:
